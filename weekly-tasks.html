<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Task Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f42;
    --accent: #4f8ef7;
    --accent2: #7c5af5;
    --green: #3ecf8e;
    --red: #f55a5a;
    --text: #e8ecf4;
    --muted: #6b7494;
    --gold: #f5c842;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 3px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .week-controls {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .week-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    color: var(--muted);
    min-width: 160px;
    text-align: center;
  }

  .week-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1.1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .week-btn:hover { background: var(--accent); border-color: var(--accent); }

  .new-week-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.82rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: opacity 0.15s, transform 0.15s;
  }
  .new-week-btn:hover { opacity: 0.85; transform: translateY(-1px); }

  /* Overall Progress */
  .overall-progress {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 28px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .progress-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    color: var(--muted);
    white-space: nowrap;
  }

  .progress-bar-wrap {
    flex: 1;
    height: 8px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--green));
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    width: 0%;
  }

  .progress-count {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    color: var(--green);
    white-space: nowrap;
    min-width: 70px;
    text-align: right;
  }

  /* Days Grid */
  .days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
    margin-bottom: 28px;
  }

  @media (max-width: 900px) {
    .days-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (max-width: 580px) {
    .days-grid { grid-template-columns: repeat(2, 1fr); }
  }

  .day-col {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    transition: border-color 0.2s;
    position: relative;
  }
  .day-col.today { border-color: var(--accent); }
  .day-col.today::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(79,142,247,0.06), rgba(124,90,245,0.04));
    pointer-events: none;
  }

  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
  }

  .day-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.05rem;
    letter-spacing: 2px;
    color: var(--muted);
  }
  .day-col.today .day-name { color: var(--accent); }

  .day-badge {
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: var(--accent);
    color: white;
    padding: 2px 6px;
    border-radius: 4px;
  }

  .day-progress {
    font-size: 0.7rem;
    color: var(--muted);
    font-weight: 500;
    margin-bottom: 2px;
  }

  .day-mini-bar-wrap {
    margin-top: auto;
    padding-top: 10px;
    height: 5px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .day-mini-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--green));
    transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* Tasks */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    cursor: pointer;
    padding: 7px 8px;
    border-radius: 8px;
    border: 1px solid transparent;
    transition: background 0.15s, border-color 0.15s;
    user-select: none;
    position: relative;
  }
  .task-item:hover { background: var(--surface2); border-color: var(--border); }
  .task-item.done { opacity: 0.5; }

  .task-checkbox {
    width: 18px; height: 18px;
    border-radius: 5px;
    border: 2px solid var(--border);
    background: transparent;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    margin-top: 1px;
    position: relative;
    overflow: hidden;
  }
  .task-item.done .task-checkbox {
    background: var(--green);
    border-color: var(--green);
    transform: scale(1.15);
  }
  .task-item.done .task-checkbox::after {
    content: '✓';
    font-size: 11px;
    color: #0d0f14;
    font-weight: 900;
  }

  /* Burst particles */
  .burst {
    position: absolute;
    width: 6px; height: 6px;
    border-radius: 50%;
    pointer-events: none;
    animation: burst-out 0.5s ease-out forwards;
  }
  @keyframes burst-out {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  .task-label {
    font-size: 0.82rem;
    font-weight: 400;
    color: var(--text);
    line-height: 1.4;
    transition: all 0.25s;
  }
  .task-item.done .task-label {
    text-decoration: line-through;
    color: var(--muted);
  }

  /* Add task */
  .add-task-wrap {
    display: flex;
    gap: 6px;
    margin-top: 4px;
  }
  .add-task-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    padding: 5px 8px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
  }
  .add-task-input:focus { border-color: var(--accent); }
  .add-task-input::placeholder { color: var(--muted); }

  .add-task-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--accent);
    width: 26px; height: 26px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .add-task-btn:hover { background: var(--accent); color: white; }

  /* History Panel */
  .history-section {
    margin-top: 10px;
  }
  .history-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 3px;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .history-weeks {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .history-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .history-card:hover { border-color: var(--accent2); }
  .history-card.active-week { border-color: var(--accent); background: rgba(79,142,247,0.06); }

  .history-week-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.95rem;
    letter-spacing: 2px;
    color: var(--text);
  }
  .history-stats {
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .history-stat {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 500;
  }
  .history-stat span {
    color: var(--green);
    font-weight: 700;
  }
  .history-pct {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    color: var(--gold);
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--green);
    color: #0d0f14;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 1px;
    padding: 10px 22px;
    border-radius: 99px;
    opacity: 0;
    transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    pointer-events: none;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Confetti canvas */
  #confetti-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 9999;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px 32px;
    width: 360px;
    max-width: 95vw;
  }
  .modal h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 3px;
    margin-bottom: 8px;
  }
  .modal p { font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; }
  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    padding: 10px 14px;
    border-radius: 8px;
    outline: none;
    margin-bottom: 16px;
  }
  .modal-input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-cancel {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
  }
  .modal-confirm {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: white;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
  }

  .delete-task {
    margin-left: auto;
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.9rem;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
    padding: 0 2px;
    line-height: 1;
    flex-shrink: 0;
  }
  .task-item:hover .delete-task { opacity: 1; }
  .delete-task:hover { color: var(--red); }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="toast" id="toast"></div>

<!-- New Week Modal -->
<div class="modal-overlay" id="newWeekModal">
  <div class="modal">
    <h2>NEW WEEK</h2>
    <p>Name this week and start fresh. All tasks from the current week will be saved to history.</p>
    <input class="modal-input" id="newWeekName" placeholder="e.g. April 1 – 7" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" onclick="confirmNewWeek()">Start Week</button>
    </div>
  </div>
</div>

<div class="header">
  <div class="logo">TASK TRACKER</div>
  <div class="week-controls">
    <button class="week-btn" id="prevBtn" onclick="navigateWeek(-1)">‹</button>
    <div class="week-label" id="weekLabel">—</div>
    <button class="week-btn" id="nextBtn" onclick="navigateWeek(1)">›</button>
    <button class="new-week-btn" onclick="openModal()">+ NEW WEEK</button>
  </div>
</div>

<div class="overall-progress">
  <div class="progress-text">WEEKLY PROGRESS</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
  </div>
  <div class="progress-count" id="progressCount">0 / 0</div>
</div>

<div class="days-grid" id="daysGrid"></div>

<div class="history-section" id="historySection"></div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const COLORS = ['#4f8ef7','#7c5af5','#3ecf8e','#f5c842','#f55a5a','#f5834f','#5af5e8'];

let data = JSON.parse(localStorage.getItem('taskTracker') || 'null') || {
  currentWeekIndex: 0,
  weeks: [{
    id: 0,
    name: getDefaultWeekName(),
    days: DAYS.map(d => ({ name: d, tasks: [] }))
  }]
};

let viewingWeekIndex = data.currentWeekIndex;

function getDefaultWeekName() {
  const now = new Date();
  const m = now.toLocaleString('default', { month: 'short' });
  return `${m} ${now.getDate()}`;
}

function save() {
  localStorage.setItem('taskTracker', JSON.stringify(data));
}

function currentWeek() {
  return data.weeks[viewingWeekIndex];
}

function isCurrentWeek() {
  return viewingWeekIndex === data.currentWeekIndex;
}

function render() {
  const week = currentWeek();
  document.getElementById('weekLabel').textContent = week.name.toUpperCase();
  document.getElementById('prevBtn').disabled = viewingWeekIndex === 0;
  document.getElementById('nextBtn').disabled = viewingWeekIndex === data.weeks.length - 1;

  // Count total/done
  let total = 0, done = 0;
  week.days.forEach(day => {
    total += day.tasks.length;
    done += day.tasks.filter(t => t.done).length;
  });
  const pct = total === 0 ? 0 : Math.round(done / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${done} / ${total}`;

  // Days
  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  const todayName = new Date().toLocaleDateString('en-US',{weekday:'long'});

  week.days.forEach((day, di) => {
    const isToday = isCurrentWeek() && day.name === todayName;
    const dayDone = day.tasks.filter(t=>t.done).length;
    const dayTotal = day.tasks.length;

    const col = document.createElement('div');
    col.className = 'day-col' + (isToday ? ' today' : '');

    col.innerHTML = `
      <div class="day-header">
        <div class="day-name">${day.name.slice(0,3).toUpperCase()}</div>
        ${isToday ? '<div class="day-badge">Today</div>' : ''}
      </div>
      <div class="day-progress">${dayDone}/${dayTotal} done</div>
    `;

    // Tasks
    day.tasks.forEach((task, ti) => {
      const item = document.createElement('div');
      item.className = 'task-item' + (task.done ? ' done' : '');
      item.innerHTML = `
        <div class="task-checkbox"></div>
        <div class="task-label">${task.text}</div>
        ${isCurrentWeek() ? `<button class="delete-task" onclick="deleteTask(event,${di},${ti})">✕</button>` : ''}
      `;
      item.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-task')) return;
        if (!isCurrentWeek()) return;
        toggleTask(di, ti, item);
      });
      col.appendChild(item);
    });

    // Add task input (only current week)
    if (isCurrentWeek()) {
      const addWrap = document.createElement('div');
      addWrap.className = 'add-task-wrap';
      addWrap.innerHTML = `
        <input class="add-task-input" placeholder="Add task…" id="inp-${di}" />
        <button class="add-task-btn" onclick="addTask(${di})">+</button>
      `;
      const inp = addWrap.querySelector('input');
      inp.addEventListener('keydown', e => { if (e.key === 'Enter') addTask(di); });
      col.appendChild(addWrap);
    }

    // Mini progress bar at bottom
    const dayPct = dayTotal === 0 ? 0 : Math.round(dayDone / dayTotal * 100);
    const miniBar = document.createElement('div');
    miniBar.className = 'day-mini-bar-wrap';
    miniBar.innerHTML = `<div class="day-mini-bar-fill" style="width:${dayPct}%"></div>`;
    col.appendChild(miniBar);

    grid.appendChild(col);
  });

  // History
  renderHistory();
}

function toggleTask(di, ti, el) {
  const task = data.weeks[viewingWeekIndex].days[di].tasks[ti];
  task.done = !task.done;
  save();

  if (task.done) {
    el.classList.add('done');
    spawnBurst(el);
    showToast('✓ Task complete!');
    checkAllDone();
  } else {
    el.classList.remove('done');
  }

  // Update counts
  render();
}

function spawnBurst(el) {
  const cb = el.querySelector('.task-checkbox');
  const rect = cb.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  const colors = ['#3ecf8e','#4f8ef7','#f5c842','#f55a5a','#7c5af5'];
  for (let i = 0; i < 10; i++) {
    const p = document.createElement('div');
    p.className = 'burst';
    const angle = (i / 10) * Math.PI * 2;
    const dist = 28 + Math.random() * 18;
    p.style.cssText = `
      left: ${cx + window.scrollX}px;
      top: ${cy + window.scrollY}px;
      background: ${colors[i % colors.length]};
      --tx: ${Math.cos(angle)*dist}px;
      --ty: ${Math.sin(angle)*dist}px;
      position: fixed;
      z-index: 9998;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 600);
  }
}

function checkAllDone() {
  const week = currentWeek();
  const total = week.days.reduce((a,d)=>a+d.tasks.length,0);
  const done = week.days.reduce((a,d)=>a+d.tasks.filter(t=>t.done).length,0);
  if (total > 0 && done === total) {
    setTimeout(() => launchConfetti(), 200);
    showToast('🏆 Week complete! Incredible work!');
  }
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const pieces = Array.from({length:120},()=>({
    x: Math.random()*canvas.width,
    y: -10,
    r: 4+Math.random()*6,
    c: COLORS[Math.floor(Math.random()*COLORS.length)],
    vx: (Math.random()-0.5)*4,
    vy: 2+Math.random()*4,
    rot: Math.random()*360,
    vrot: (Math.random()-0.5)*8
  }));
  let frame;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let active = false;
    pieces.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot; p.vy+=0.07;
      if (p.y < canvas.height+20) active = true;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.c;
      ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);
      ctx.restore();
    });
    if (active) frame = requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
  setTimeout(()=>{ cancelAnimationFrame(frame); ctx.clearRect(0,0,canvas.width,canvas.height); },4000);
}

function addTask(di) {
  const inp = document.getElementById(`inp-${di}`);
  const text = inp.value.trim();
  if (!text) return;
  data.weeks[data.currentWeekIndex].days[di].tasks.push({ text, done: false });
  save();
  render();
  // Re-focus
  setTimeout(() => {
    const newInp = document.getElementById(`inp-${di}`);
    if (newInp) newInp.focus();
  }, 10);
}

function deleteTask(e, di, ti) {
  e.stopPropagation();
  data.weeks[data.currentWeekIndex].days[di].tasks.splice(ti, 1);
  save();
  render();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function openModal() {
  const now = new Date();
  const end = new Date(now);
  end.setDate(end.getDate() + 6);
  const fmt = d => d.toLocaleString('default',{month:'short',day:'numeric'});
  document.getElementById('newWeekName').value = `${fmt(now)} – ${fmt(end)}`;
  document.getElementById('newWeekModal').classList.add('open');
  setTimeout(()=>document.getElementById('newWeekName').select(),100);
}

function closeModal() {
  document.getElementById('newWeekModal').classList.remove('open');
}

function confirmNewWeek() {
  const name = document.getElementById('newWeekName').value.trim() || getDefaultWeekName();
  const newWeek = {
    id: Date.now(),
    name,
    days: DAYS.map(d => ({ name: d, tasks: [] }))
  };
  data.weeks.push(newWeek);
  data.currentWeekIndex = data.weeks.length - 1;
  viewingWeekIndex = data.currentWeekIndex;
  save();
  closeModal();
  render();
  showToast('🗓 New week started!');
}

function navigateWeek(dir) {
  viewingWeekIndex = Math.max(0, Math.min(data.weeks.length-1, viewingWeekIndex + dir));
  render();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  if (data.weeks.length <= 1) { section.innerHTML = ''; return; }

  section.innerHTML = `<div class="history-title">WEEK HISTORY</div><div class="history-weeks" id="historyList"></div>`;
  const list = document.getElementById('historyList');

  [...data.weeks].reverse().forEach((week, i) => {
    const realIdx = data.weeks.length - 1 - i;
    const total = week.days.reduce((a,d)=>a+d.tasks.length,0);
    const done = week.days.reduce((a,d)=>a+d.tasks.filter(t=>t.done).length,0);
    const pct = total === 0 ? 0 : Math.round(done/total*100);
    const isCurrent = realIdx === data.currentWeekIndex;
    const isViewing = realIdx === viewingWeekIndex;

    const card = document.createElement('div');
    card.className = 'history-card' + (isViewing ? ' active-week' : '');
    card.innerHTML = `
      <div class="history-week-label">${week.name.toUpperCase()}${isCurrent ? ' · CURRENT' : ''}</div>
      <div class="history-stats">
        <div class="history-stat"><span>${done}</span>/${total} tasks</div>
        <div class="history-pct">${pct}%</div>
      </div>
    `;
    card.addEventListener('click', () => {
      viewingWeekIndex = realIdx;
      render();
    });
    list.appendChild(card);
  });
}

render();
</script>
</body>
</html>
