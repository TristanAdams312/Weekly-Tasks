<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Task Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14; --surface: #161920; --surface2: #1e2230; --border: #2a2f42;
    --accent: #4f8ef7; --accent2: #7c5af5; --green: #3ecf8e; --red: #f55a5a;
    --text: #e8ecf4; --muted: #6b7494; --gold: #f5c842;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 32px 20px 60px; }

  /* Header */
  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.4rem; letter-spacing: 3px; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .week-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .week-label { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; letter-spacing: 2px; color: var(--muted); min-width: 160px; text-align: center; }
  .week-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .week-btn:hover { background: var(--accent); border-color: var(--accent); }
  .new-week-btn { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: white; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.82rem; letter-spacing: 1px; text-transform: uppercase; transition: opacity 0.15s, transform 0.15s; }
  .new-week-btn:hover { opacity: 0.85; transform: translateY(-1px); }

  /* Overall Progress */
  .overall-progress { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 28px; margin-bottom: 28px; display: flex; align-items: center; gap: 24px; }
  .progress-text { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px; color: var(--muted); white-space: nowrap; }
  .progress-bar-wrap { flex: 1; height: 8px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--green)); border-radius: 99px; transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); width: 0%; }
  .progress-count { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--green); white-space: nowrap; min-width: 70px; text-align: right; }

  /* Days Grid */
  .days-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 28px; }
  @media (max-width: 780px) { .days-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 480px) { .days-grid { grid-template-columns: repeat(2, 1fr); } }

  .day-col { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 12px; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.2s, background 0.2s; position: relative; min-height: 120px; }
  .day-col.today { border-color: var(--accent); }
  .day-col.today::before { content: ''; position: absolute; inset: 0; border-radius: 14px; background: linear-gradient(135deg, rgba(79,142,247,0.06), rgba(124,90,245,0.04)); pointer-events: none; }
  .day-col.drag-over { border-color: var(--green) !important; background: rgba(62,207,142,0.06); }
  .day-col.day-complete { border-color: var(--gold) !important; }

  .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  .day-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.05rem; letter-spacing: 2px; color: var(--muted); }
  .day-col.today .day-name { color: var(--accent); }
  .day-col.day-complete .day-name { color: var(--gold); }
  .day-badge { font-size: 0.65rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; }
  .day-progress { font-size: 0.7rem; color: var(--muted); font-weight: 500; margin-bottom: 2px; }

  /* Mini bar */
  .day-mini-bar-wrap { margin-top: auto; padding-top: 10px; }
  .day-mini-bar-track { height: 6px; background: var(--surface2); border-radius: 99px; overflow: hidden; }
  .day-mini-bar-fill { height: 100%; width: 0%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--green)); transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.5s ease, box-shadow 0.5s ease; }
  .day-mini-bar-fill.full { background: linear-gradient(90deg, var(--gold), #ffb347); box-shadow: 0 0 10px rgba(245,200,66,0.7); }

  /* Tasks */
  .task-item { display: flex; align-items: flex-start; gap: 6px; padding: 6px 8px; border-radius: 8px; border: 1px solid transparent; transition: background 0.15s, border-color 0.15s, opacity 0.2s; user-select: none; position: relative; cursor: default; }
  .task-item:hover { background: var(--surface2); border-color: var(--border); }
  .task-item.done { opacity: 0.45; }
  .task-item.dragging { opacity: 0.2; }

  .task-checkbox { width: 18px; height: 18px; border-radius: 5px; border: 2px solid var(--border); background: transparent; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); margin-top: 1px; position: relative; overflow: hidden; cursor: pointer; }
  .task-item.done .task-checkbox { background: var(--green); border-color: var(--green); transform: scale(1.15); }
  .task-item.done .task-checkbox::after { content: '✓'; font-size: 11px; color: #0d0f14; font-weight: 900; }

  .burst { position: fixed; width: 6px; height: 6px; border-radius: 50%; pointer-events: none; animation: burst-out 0.5s ease-out forwards; z-index: 9998; }
  @keyframes burst-out { 0% { transform: translate(0,0) scale(1); opacity: 1; } 100% { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; } }

  /* Inline edit */
  .task-label { font-size: 0.82rem; font-weight: 400; color: var(--text); line-height: 1.4; transition: all 0.25s; flex: 1; min-width: 0; word-break: break-word; }
  .task-item.done .task-label { text-decoration: line-through; color: var(--muted); }
  .task-edit-input { flex: 1; background: var(--surface); border: 1px solid var(--accent); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.82rem; padding: 2px 6px; border-radius: 5px; outline: none; min-width: 0; }

  /* Action buttons */
  .task-actions { display: flex; align-items: center; gap: 1px; opacity: 0; transition: opacity 0.15s; flex-shrink: 0; }
  .task-item:hover .task-actions { opacity: 1; }
  .task-action-btn { background: none; border: none; cursor: pointer; font-size: 0.8rem; padding: 2px 3px; border-radius: 4px; color: var(--muted); transition: color 0.15s; line-height: 1; }
  .task-action-btn.drag-handle { cursor: grab; font-size: 0.9rem; }
  .task-action-btn.drag-handle:hover { color: var(--accent); }
  .task-action-btn.edit-btn:hover { color: var(--accent); }
  .task-action-btn.up-btn:hover, .task-action-btn.down-btn:hover { color: var(--accent2); }
  .task-action-btn.del-btn:hover { color: var(--red); }

  /* Add task */
  .add-task-wrap { display: flex; gap: 6px; margin-top: 4px; }
  .add-task-input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.78rem; padding: 5px 8px; border-radius: 6px; outline: none; transition: border-color 0.15s; }
  .add-task-input:focus { border-color: var(--accent); }
  .add-task-input::placeholder { color: var(--muted); }
  .add-task-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--accent); width: 26px; height: 26px; border-radius: 6px; cursor: pointer; font-size: 1rem; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
  .add-task-btn:hover { background: var(--accent); color: white; }

  /* History */
  .history-section { margin-top: 10px; }
  .history-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 3px; color: var(--muted); margin-bottom: 12px; }
  .history-weeks { display: flex; flex-direction: column; gap: 8px; }
  .history-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 16px; cursor: pointer; transition: border-color 0.15s; }
  .history-card:hover { border-color: var(--accent2); }
  .history-card.active-week { border-color: var(--accent); background: rgba(79,142,247,0.06); }
  .history-week-label { font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 2px; color: var(--text); }
  .history-right { display: flex; align-items: center; gap: 16px; }
  .history-stats { display: flex; gap: 16px; align-items: center; }
  .history-stat { font-size: 0.75rem; color: var(--muted); font-weight: 500; }
  .history-stat span { color: var(--green); font-weight: 700; }
  .history-pct { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--gold); }
  .delete-week-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.72rem; font-family: 'DM Sans', sans-serif; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; white-space: nowrap; flex-shrink: 0; }
  .delete-week-btn:hover { border-color: var(--red); color: var(--red); background: rgba(245,90,90,0.08); }

  /* Day complete flash overlay */
  .day-flash { position: absolute; inset: 0; border-radius: 14px; pointer-events: none; opacity: 0; background: radial-gradient(circle, rgba(245,200,66,0.18) 0%, transparent 70%); animation: day-flash-anim 1.2s ease-out forwards; z-index: 2; }
  @keyframes day-flash-anim { 0% { opacity: 0; } 20% { opacity: 1; } 100% { opacity: 0; } }

  /* Toast */
  .toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--green); color: #0d0f14; font-weight: 700; font-size: 0.85rem; letter-spacing: 1px; padding: 10px 22px; border-radius: 99px; opacity: 0; transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1); pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #confetti-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999; }

  /* Modals */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 28px 32px; width: 380px; max-width: 95vw; }
  .modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 3px; margin-bottom: 8px; }
  .modal p { font-size: 0.85rem; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.9rem; padding: 10px 14px; border-radius: 8px; outline: none; margin-bottom: 16px; }
  .modal-input:focus { border-color: var(--accent); }
  .modal-btns { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; }
  .modal-confirm { background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; color: white; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.85rem; }
  .modal-danger { background: var(--red); border: none; color: white; padding: 8px 18px; border-radius: 8px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 600; font-size: 0.85rem; }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>
<div class="toast" id="toast"></div>

<!-- New Week Modal -->
<div class="modal-overlay" id="newWeekModal">
  <div class="modal">
    <h2>NEW WEEK</h2>
    <p>Name this week and start fresh. Your current week will be saved to history.</p>
    <input class="modal-input" id="newWeekName" placeholder="e.g. April 1 – 5" />
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('newWeekModal')">Cancel</button>
      <button class="modal-confirm" onclick="confirmNewWeek()">Start Week</button>
    </div>
  </div>
</div>

<!-- Delete Week Modal -->
<div class="modal-overlay" id="deleteWeekModal">
  <div class="modal">
    <h2>DELETE WEEK</h2>
    <p id="deleteWeekMsg">Are you sure? This cannot be undone.</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal('deleteWeekModal')">Cancel</button>
      <button class="modal-danger" onclick="confirmDeleteWeek()">Delete</button>
    </div>
  </div>
</div>

<div class="header">
  <div class="logo">TASK TRACKER</div>
  <div class="week-controls">
    <button class="week-btn" id="prevBtn" onclick="navigateWeek(-1)">‹</button>
    <div class="week-label" id="weekLabel">—</div>
    <button class="week-btn" id="nextBtn" onclick="navigateWeek(1)">›</button>
    <button class="new-week-btn" onclick="openNewWeekModal()">+ NEW WEEK</button>
  </div>
</div>

<div class="overall-progress">
  <div class="progress-text">WEEKLY PROGRESS</div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>
  <div class="progress-count" id="progressCount">0 / 0</div>
</div>

<div class="days-grid" id="daysGrid"></div>
<div class="history-section" id="historySection"></div>

<script>
const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday'];
const BURST_COLORS = ['#3ecf8e','#4f8ef7','#f5c842','#f55a5a','#7c5af5'];

let data = JSON.parse(localStorage.getItem('taskTracker_v2') || 'null');
if (!data) {
  const old = localStorage.getItem('taskTracker');
  if (old) {
    try { const p = JSON.parse(old); p.weeks.forEach(w => { w.days = w.days.filter(d => DAYS.includes(d.name)); }); data = p; } catch(e) {}
  }
  if (!data) data = { currentWeekIndex: 0, weeks: [{ id: 0, name: getDefaultWeekName(), days: DAYS.map(d=>({name:d,tasks:[]})) }] };
}

let viewingWeekIndex = data.currentWeekIndex;
let deleteTargetIndex = null;
let dragSrcDay = null, dragSrcTask = null;
// Track which days have already fired celebration this render cycle
const celebratedDays = new Set();

function getDefaultWeekName() {
  const now = new Date();
  return now.toLocaleString('default', { month: 'short', day: 'numeric' });
}

function save() { localStorage.setItem('taskTracker_v2', JSON.stringify(data)); }
function currentWeek() { return data.weeks[viewingWeekIndex]; }
function isCurrentWeek() { return viewingWeekIndex === data.currentWeekIndex; }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── RENDER ───────────────────────────────────────────────────────────
function render() {
  const week = currentWeek();
  document.getElementById('weekLabel').textContent = week.name.toUpperCase();
  document.getElementById('prevBtn').disabled = viewingWeekIndex === 0;
  document.getElementById('nextBtn').disabled = viewingWeekIndex === data.weeks.length - 1;

  let total = 0, done = 0;
  week.days.forEach(d => { total += d.tasks.length; done += d.tasks.filter(t=>t.done).length; });
  const pct = total === 0 ? 0 : Math.round(done/total*100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressCount').textContent = `${done} / ${total}`;

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = '';
  const todayName = new Date().toLocaleDateString('en-US',{weekday:'long'});

  week.days.forEach((day, di) => {
    const isToday = isCurrentWeek() && day.name === todayName;
    const dayDone = day.tasks.filter(t=>t.done).length;
    const dayTotal = day.tasks.length;
    const dayPct = dayTotal === 0 ? 0 : Math.round(dayDone/dayTotal*100);
    const dayComplete = dayTotal > 0 && dayDone === dayTotal;

    const col = document.createElement('div');
    col.className = 'day-col' + (isToday ? ' today' : '') + (dayComplete ? ' day-complete' : '');

    // Cross-day drag events
    col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drag-over'); });
    col.addEventListener('dragleave', e => { if (!col.contains(e.relatedTarget)) col.classList.remove('drag-over'); });
    col.addEventListener('drop', e => { e.preventDefault(); col.classList.remove('drag-over'); dropTask(di); });

    col.innerHTML = `
      <div class="day-header">
        <div class="day-name">${day.name.slice(0,3).toUpperCase()}</div>
        ${isToday ? '<div class="day-badge">Today</div>' : ''}
      </div>
      <div class="day-progress">${dayDone}/${dayTotal} done</div>
    `;

    day.tasks.forEach((task, ti) => {
      const item = document.createElement('div');
      item.className = 'task-item' + (task.done ? ' done' : '');
      item.draggable = isCurrentWeek();

      const upDisabled = ti === 0;
      const downDisabled = ti === day.tasks.length - 1;

      item.innerHTML = `
        <div class="task-checkbox"></div>
        <div class="task-label">${esc(task.text)}</div>
        <div class="task-actions">
          ${isCurrentWeek() ? `
            <button class="task-action-btn up-btn" title="Move up" ${upDisabled?'disabled style="opacity:0.25;cursor:default"':''} onclick="moveTask(event,${di},${ti},-1)">↑</button>
            <button class="task-action-btn down-btn" title="Move down" ${downDisabled?'disabled style="opacity:0.25;cursor:default"':''} onclick="moveTask(event,${di},${ti},1)">↓</button>
            <button class="task-action-btn edit-btn" title="Edit" onclick="startEdit(event,${di},${ti})">✎</button>
            <button class="task-action-btn drag-handle" title="Drag to another day">⠿</button>
          ` : ''}
          <button class="task-action-btn del-btn" title="Delete" onclick="deleteTask(event,${di},${ti})">✕</button>
        </div>
      `;

      item.querySelector('.task-checkbox').addEventListener('click', e => { e.stopPropagation(); toggleTask(di, ti, item, col); });

      if (isCurrentWeek()) {
        item.addEventListener('dragstart', e => { dragSrcDay = di; dragSrcTask = ti; setTimeout(() => item.classList.add('dragging'), 0); e.dataTransfer.effectAllowed = 'move'; });
        item.addEventListener('dragend', () => item.classList.remove('dragging'));
      }

      col.appendChild(item);
    });

    if (isCurrentWeek()) {
      const addWrap = document.createElement('div');
      addWrap.className = 'add-task-wrap';
      addWrap.innerHTML = `<input class="add-task-input" placeholder="Add task…" id="inp-${di}" /><button class="add-task-btn" onclick="addTask(${di})">+</button>`;
      addWrap.querySelector('input').addEventListener('keydown', e => { if (e.key==='Enter') addTask(di); });
      col.appendChild(addWrap);
    }

    // Mini bar — starts at 0, updated in place after render
    const miniBar = document.createElement('div');
    miniBar.className = 'day-mini-bar-wrap';
    miniBar.innerHTML = `<div class="day-mini-bar-track"><div class="day-mini-bar-fill" id="mini-fill-${di}" style="width:0%"></div></div>`;
    col.appendChild(miniBar);

    grid.appendChild(col);
  });

  // Update mini bars in place so CSS transition fires
  requestAnimationFrame(() => {
    week.days.forEach((day, di) => {
      const dayDone = day.tasks.filter(t=>t.done).length;
      const dayTotal = day.tasks.length;
      const dayPct = dayTotal === 0 ? 0 : Math.round(dayDone/dayTotal*100);
      const dayComplete = dayTotal > 0 && dayDone === dayTotal;
      const fill = document.getElementById(`mini-fill-${di}`);
      if (fill) {
        fill.style.width = dayPct + '%';
        if (dayComplete) fill.classList.add('full');
        else fill.classList.remove('full');
      }
    });
  });

  renderHistory();
}

// ── TOGGLE ───────────────────────────────────────────────────────────
function toggleTask(di, ti, el, colEl) {
  const week = data.weeks[viewingWeekIndex];
  const task = week.days[di].tasks[ti];
  const wasNotDone = !task.done;
  task.done = !task.done;
  save();

  if (task.done) {
    el.classList.add('done');
    spawnBurst(el);
    showToast('✓ Task complete!');

    // Check if entire day is now done
    const day = week.days[di];
    const dayDone = day.tasks.filter(t=>t.done).length;
    const dayTotal = day.tasks.length;
    if (dayTotal > 0 && dayDone === dayTotal && wasNotDone) {
      celebrateDay(colEl, di);
    }

    checkAllDone();
  } else {
    el.classList.remove('done');
  }
  render();
}

function celebrateDay(colEl, di) {
  // Flash overlay on the column
  const flash = document.createElement('div');
  flash.className = 'day-flash';
  colEl.appendChild(flash);
  setTimeout(() => flash.remove(), 1300);

  // Mini burst from bar area
  const bar = colEl.querySelector('.day-mini-bar-wrap');
  if (bar) {
    const r = bar.getBoundingClientRect();
    for (let i = 0; i < 14; i++) {
      const p = document.createElement('div');
      p.className = 'burst';
      const angle = (i/14)*Math.PI*2, dist = 20+Math.random()*30;
      p.style.cssText = `left:${r.left+r.width/2}px;top:${r.top+4}px;background:${BURST_COLORS[i%5]};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;width:5px;height:5px;`;
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 700);
    }
  }

  showToast('🌟 Day complete!');
}

function spawnBurst(el) {
  const cb = el.querySelector('.task-checkbox');
  const r = cb.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'burst';
    const angle = (i/12)*Math.PI*2, dist = 24+Math.random()*22;
    p.style.cssText = `left:${cx}px;top:${cy}px;background:${BURST_COLORS[i%5]};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 600);
  }
}

function checkAllDone() {
  const w = currentWeek();
  const total = w.days.reduce((a,d)=>a+d.tasks.length,0);
  const done = w.days.reduce((a,d)=>a+d.tasks.filter(t=>t.done).length,0);
  if (total > 0 && done === total) { setTimeout(launchConfetti, 400); setTimeout(()=>showToast('🏆 Week complete! Incredible work!'), 600); }
}

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas'), ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const pieces = Array.from({length:140},()=>({ x:Math.random()*canvas.width, y:-10, r:4+Math.random()*6, c:BURST_COLORS[Math.floor(Math.random()*5)], vx:(Math.random()-.5)*4, vy:2+Math.random()*4, rot:Math.random()*360, vrot:(Math.random()-.5)*8 }));
  let frame;
  (function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height); let active=false;
    pieces.forEach(p=>{ p.x+=p.vx;p.y+=p.vy;p.rot+=p.vrot;p.vy+=0.07; if(p.y<canvas.height+20)active=true; ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);ctx.fillStyle=p.c;ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r);ctx.restore(); });
    if(active) frame=requestAnimationFrame(draw); else ctx.clearRect(0,0,canvas.width,canvas.height);
  })();
  setTimeout(()=>{ cancelAnimationFrame(frame); ctx.clearRect(0,0,canvas.width,canvas.height); },4500);
}

// ── INLINE EDIT ──────────────────────────────────────────────────────
function startEdit(e, di, ti) {
  e.stopPropagation();
  const task = data.weeks[viewingWeekIndex].days[di].tasks[ti];
  // Find the label element in the DOM
  const items = document.querySelectorAll('.task-item');
  let targetItem = null;
  items.forEach(item => {
    if (parseInt(item.dataset.di) === di && parseInt(item.dataset.ti) === ti) targetItem = item;
  });

  // Rebuild using indices stored in action buttons
  const allItems = document.querySelectorAll(`[data-di="${di}"][data-ti="${ti}"]`);
  // Fallback: find by scanning all .task-item children of the right day col
  const cols = document.querySelectorAll('.day-col');
  const col = cols[di];
  if (!col) return;
  const taskItems = col.querySelectorAll('.task-item');
  const item = taskItems[ti];
  if (!item) return;

  const label = item.querySelector('.task-label');
  if (!label) return;

  const input = document.createElement('input');
  input.className = 'task-edit-input';
  input.value = task.text;
  label.replaceWith(input);
  input.focus();
  input.select();

  function commitEdit() {
    const newText = input.value.trim();
    if (newText && newText !== task.text) {
      data.weeks[viewingWeekIndex].days[di].tasks[ti].text = newText;
      save();
    }
    render();
  }

  input.addEventListener('blur', commitEdit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = task.text; input.blur(); }
  });
}

// ── MOVE UP/DOWN WITHIN DAY ──────────────────────────────────────────
function moveTask(e, di, ti, dir) {
  e.stopPropagation();
  const tasks = data.weeks[viewingWeekIndex].days[di].tasks;
  const newTi = ti + dir;
  if (newTi < 0 || newTi >= tasks.length) return;
  [tasks[ti], tasks[newTi]] = [tasks[newTi], tasks[ti]];
  save(); render();
}

// ── ADD / DELETE ─────────────────────────────────────────────────────
function addTask(di) {
  const inp = document.getElementById(`inp-${di}`);
  const text = inp.value.trim(); if (!text) return;
  data.weeks[data.currentWeekIndex].days[di].tasks.push({text, done:false});
  save(); render();
  setTimeout(()=>{ const n=document.getElementById(`inp-${di}`); if(n) n.focus(); },10);
}

function deleteTask(e, di, ti) {
  e.stopPropagation();
  data.weeks[viewingWeekIndex].days[di].tasks.splice(ti,1);
  save(); render();
}

// ── CROSS-DAY DRAG & DROP ────────────────────────────────────────────
function dropTask(targetDi) {
  if (dragSrcDay===null || dragSrcTask===null) return;
  if (!isCurrentWeek() || dragSrcDay===targetDi) { dragSrcDay=null; dragSrcTask=null; return; }
  const week = data.weeks[data.currentWeekIndex];
  const task = week.days[dragSrcDay].tasks.splice(dragSrcTask,1)[0];
  week.days[targetDi].tasks.push(task);
  dragSrcDay=null; dragSrcTask=null;
  save(); render(); showToast('↔ Task moved!');
}

// ── WEEK MANAGEMENT ──────────────────────────────────────────────────
function openNewWeekModal() {
  const now = new Date(), end = new Date(now);
  end.setDate(end.getDate()+4);
  const fmt = d => d.toLocaleString('default',{month:'short',day:'numeric'});
  document.getElementById('newWeekName').value = `${fmt(now)} – ${fmt(end)}`;
  document.getElementById('newWeekModal').classList.add('open');
  setTimeout(()=>document.getElementById('newWeekName').select(),100);
}

function confirmNewWeek() {
  const name = document.getElementById('newWeekName').value.trim() || getDefaultWeekName();
  data.weeks.push({ id: Date.now(), name, days: DAYS.map(d=>({name:d,tasks:[]})) });
  data.currentWeekIndex = data.weeks.length - 1;
  viewingWeekIndex = data.currentWeekIndex;
  save(); closeModal('newWeekModal'); render(); showToast('🗓 New week started!');
}

function openDeleteWeekModal(e, idx) {
  e.stopPropagation();
  deleteTargetIndex = idx;
  document.getElementById('deleteWeekMsg').textContent = `Delete "${data.weeks[idx].name}"? This cannot be undone.`;
  document.getElementById('deleteWeekModal').classList.add('open');
}

function confirmDeleteWeek() {
  if (deleteTargetIndex === null) return;
  const idx = deleteTargetIndex;
  data.weeks.splice(idx, 1);
  if (!data.weeks.length) {
    data.weeks = [{ id: Date.now(), name: getDefaultWeekName(), days: DAYS.map(d=>({name:d,tasks:[]})) }];
    data.currentWeekIndex = 0;
  } else {
    data.currentWeekIndex = Math.min(data.currentWeekIndex, data.weeks.length-1);
    if (idx <= data.currentWeekIndex && data.currentWeekIndex > 0) data.currentWeekIndex--;
  }
  viewingWeekIndex = Math.min(viewingWeekIndex, data.weeks.length-1);
  if (idx <= viewingWeekIndex && viewingWeekIndex > 0) viewingWeekIndex--;
  deleteTargetIndex = null;
  save(); closeModal('deleteWeekModal'); render(); showToast('🗑 Week deleted');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function navigateWeek(dir) { viewingWeekIndex = Math.max(0, Math.min(data.weeks.length-1, viewingWeekIndex+dir)); render(); }

// ── HISTORY ──────────────────────────────────────────────────────────
function renderHistory() {
  const section = document.getElementById('historySection');
  if (data.weeks.length <= 1) { section.innerHTML=''; return; }
  section.innerHTML = `<div class="history-title">WEEK HISTORY</div><div class="history-weeks" id="historyList"></div>`;
  const list = document.getElementById('historyList');
  [...data.weeks].reverse().forEach((week, i) => {
    const realIdx = data.weeks.length - 1 - i;
    const total = week.days.reduce((a,d)=>a+d.tasks.length,0);
    const done = week.days.reduce((a,d)=>a+d.tasks.filter(t=>t.done).length,0);
    const pct = total===0 ? 0 : Math.round(done/total*100);
    const isCurrent = realIdx === data.currentWeekIndex;
    const isViewing = realIdx === viewingWeekIndex;
    const card = document.createElement('div');
    card.className = 'history-card' + (isViewing ? ' active-week' : '');
    card.innerHTML = `
      <div class="history-week-label">${esc(week.name.toUpperCase())}${isCurrent ? ' · CURRENT' : ''}</div>
      <div class="history-right">
        <div class="history-stats">
          <div class="history-stat"><span>${done}</span>/${total} tasks</div>
          <div class="history-pct">${pct}%</div>
        </div>
        <button class="delete-week-btn" onclick="openDeleteWeekModal(event,${realIdx})">Delete</button>
      </div>
    `;
    card.addEventListener('click', () => { viewingWeekIndex=realIdx; render(); });
    list.appendChild(card);
  });
}

// ── TOAST ────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2400);
}

render();
</script>
